site_name: CropForge
site_description: Open-source, code-first virtual farm runtime for agricultural researchers
site_url: https://cropforge.readthedocs.io
repo_url: https://github.com/saswatsundar123/cropforge
repo_name: saswatsundar123/cropforge

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: light-green
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Quickstart: getting_started/quickstart.md
  - Reference:
    - Crop: reference/crop.md
    - Farm & Field: reference/farm.md
    - Runtime: reference/runtime.md
    - State: reference/state.md
    - Loaders: reference/loaders.md
    - Logger: reference/logger.md
    - Visualization: reference/viz.md
    - Events: reference/events.md
  - Features:
    - Opt-In Physics: features/physics.md
    - Visual Engine: features/visual_engine.md
  - Plugins:
    - Official Plugins: plugins.md
  - Tutorials:
    - Maize Dual-Plot: tutorials/maize_dual_plot.md
    - Irrigation Trial & Slope Leaching: tutorials/irrigation_and_leaching.md
    - Disease Modeling: tutorials/disease_modeling.md
    - Multi-Season Rotation: tutorials/multi_season_rotation.md
  - PRD: prd.md
  - Changelog: changelog.md
