<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CropForge Dashboard</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png" />
  <link rel="manifest" href="favicon/site.webmanifest" />
  <link rel="shortcut icon" href="favicon/favicon.ico" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #EAEAEA;
      color: #111111;
      font-family: 'SF Pro Display', 'Geist Sans', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #loader {
      position: absolute;
      inset: 0;
      background: #9c9c9c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loader-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      border-radius: 20px;
      background: #FFFFFF;
      padding: 9px;
      margin-bottom: 18px;
      filter: drop-shadow(0 8px 22px rgba(17, 17, 17, 0.18));
    }

    #loader-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111111;
      margin-bottom: 24px;
    }

    #loader-bar-track {
      width: 260px;
      height: 3px;
      background: #EAEAEA;
      border-radius: 4px;
      overflow: hidden;
    }

    #loader-bar-fill {
      height: 100%;
      width: 0%;
      background: #111111;
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    #loader-status {
      margin-top: 12px;
      font-size: 11px;
      color: #787774;
      font-family: 'Geist Mono', 'SF Mono', monospace;
    }

    #canvas-wrapper {
      position: absolute;
      inset: 0;
    }

    canvas {
      display: block;
    }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      pointer-events: none;
      z-index: 10;
    }

    #hud-day {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #346538;
      background: #EDF3EC;
      padding: 4px 10px;
      border-radius: 9999px;
      border: none;
    }

    #hud-info {
      font-size: 11px;
      color: #787774;
      margin-top: 6px;
      background: #FFFFFF;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #EAEAEA;
    }

    /* Colour legend */
    #legend {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 120px;
      pointer-events: none;
      z-index: 10;
    }

    #legend-title {
      font-size: 10px;
      color: #64748b;
      text-align: center;
      margin-bottom: 4px;
    }

    #legend-bar {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #d4a60a, #2e8b57);
    }

    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #4a5568;
      margin-top: 2px;
      font-family: monospace;
    }

    #legend-dead {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 10px;
      color: #64748b;
    }

    #legend-dead-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: #8B6914;
      flex-shrink: 0;
    }

    /* Controls overlay */
    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 10;
      background: #FFFFFF;
      border: 1px solid #EAEAEA;
      border-radius: 8px;
      padding: 8px 16px;
      align-items: center;
      box-shadow: none;
    }

    #controls button {
      background: #FFFFFF;
      color: #787774;
      border: 1px solid #EAEAEA;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #controls button:hover {
      background: #F9F9F8;
      color: #111111;
    }

    #controls button.active {
      background: #111111;
      color: #FFFFFF;
      border-color: #111111;
    }

    #speed-label {
      font-size: 11px;
      color: #4B5563;
    }

    /* Colour variable select */
    #var-select-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    #var-select {
      background: #FFFFFF;
      color: #111111;
      border: 1px solid #EAEAEA;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <!-- Loading screen -->
  <div id="loader">
    <img id="loader-logo" src="CropForge_Logo.png" alt="CropForge logo" />
    <div id="loader-title">CropForge Dashboard</div>
    <div id="loader-bar-track">
      <div id="loader-bar-fill"></div>
    </div>
    <div id="loader-status">Initialising...</div>
  </div>

  <!-- Three.js canvas -->
  <div id="canvas-wrapper"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-day">Day —</div>
    <div id="hud-info">—</div>
  </div>

  <!-- Colour variable selector -->
  <div id="var-select-wrap">
    <select id="var-select">
      <option value="biomass_g">Biomass (g)</option>
      <option value="lai">LAI</option>
      <option value="weed_lai">Weed LAI</option>
      <option value="height_cm">Height (cm)</option>
      <option value="stress_index">Stress Index</option>
    </select>
  </div>

  <!-- Colour legend -->
  <div id="legend">
    <div id="legend-title">Biomass (g)</div>
    <div id="legend-bar"></div>
    <div id="legend-labels">
      <span id="legend-min">0</span>
      <span id="legend-max">—</span>
    </div>
    <div id="legend-dead">
      <div id="legend-dead-swatch"></div>
      <span>Dead plant</span>
    </div>
  </div>

  <!-- Playback controls -->
  <div id="controls">
    <button id="btn-play" class="active">&#9654; Play</button>
    <button id="btn-1x">1×</button>
    <button id="btn-2x">2×</button>
    <button id="btn-5x">5×</button>
    <span id="speed-label">Speed</span>
    <button id="btn-export-glb" title="Download current day as .glb">Export GLB</button>
  </div>

  <!-- Three.js r152 from CDN (offline users: replace with local copy) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>

</body>

</html>
