<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CropForge 3D Viewport</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #loader {
      position: absolute;
      inset: 0;
      background: #0a0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    #loader-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a9eff;
      margin-bottom: 24px;
    }
    #loader-bar-track {
      width: 260px;
      height: 4px;
      background: #1a2332;
      border-radius: 4px;
      overflow: hidden;
    }
    #loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a9eff, #34d399);
      border-radius: 4px;
      transition: width 0.15s ease;
    }
    #loader-status {
      margin-top: 12px;
      font-size: 12px;
      color: #4a5568;
      font-family: monospace;
    }

    #canvas-wrapper {
      position: absolute;
      inset: 0;
    }
    canvas { display: block; }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      pointer-events: none;
      z-index: 10;
    }
    #hud-day {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #4a9eff;
      background: rgba(10,15,26,0.75);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #1e2a3a;
    }
    #hud-info {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      background: rgba(10,15,26,0.75);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* Colour legend */
    #legend {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 120px;
      pointer-events: none;
      z-index: 10;
    }
    #legend-title {
      font-size: 10px;
      color: #64748b;
      text-align: center;
      margin-bottom: 4px;
    }
    #legend-bar {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #d4a60a, #2e8b57);
    }
    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #4a5568;
      margin-top: 2px;
      font-family: monospace;
    }
    #legend-dead {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 10px;
      color: #64748b;
    }
    #legend-dead-swatch {
      width: 12px; height: 12px;
      border-radius: 2px;
      background: #8B6914;
      flex-shrink: 0;
    }

    /* Controls overlay */
    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 10;
      background: rgba(10,15,26,0.85);
      border: 1px solid #1e2a3a;
      border-radius: 8px;
      padding: 8px 16px;
      align-items: center;
    }
    #controls button {
      background: #1a2332;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #controls button:hover { background: #243044; color: #e2e8f0; }
    #controls button.active { background: #1e3a5f; color: #4a9eff; border-color: #4a9eff; }
    #speed-label { font-size: 11px; color: #64748b; }

    /* Colour variable select */
    #var-select-wrap {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }
    #var-select {
      background: #1a2332;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loader">
    <div id="loader-title">CropForge 3D Viewport</div>
    <div id="loader-bar-track">
      <div id="loader-bar-fill"></div>
    </div>
    <div id="loader-status">Initialising…</div>
  </div>

  <!-- Three.js canvas -->
  <div id="canvas-wrapper"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-day">Day —</div>
    <div id="hud-info">—</div>
  </div>

  <!-- Colour variable selector -->
  <div id="var-select-wrap">
    <select id="var-select">
      <option value="biomass_g">Biomass (g)</option>
      <option value="lai">LAI</option>
      <option value="height_cm">Height (cm)</option>
      <option value="stress_index">Stress Index</option>
    </select>
  </div>

  <!-- Colour legend -->
  <div id="legend">
    <div id="legend-title">Biomass (g)</div>
    <div id="legend-bar"></div>
    <div id="legend-labels">
      <span id="legend-min">0</span>
      <span id="legend-max">—</span>
    </div>
    <div id="legend-dead">
      <div id="legend-dead-swatch"></div>
      <span>Dead plant</span>
    </div>
  </div>

  <!-- Playback controls -->
  <div id="controls">
    <button id="btn-play" class="active">&#9654; Play</button>
    <button id="btn-1x">1×</button>
    <button id="btn-2x">2×</button>
    <button id="btn-5x">5×</button>
    <span id="speed-label">Speed</span>
  </div>

  <!-- Three.js r152 from CDN (offline users: replace with local copy) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>

</body>
</html>
