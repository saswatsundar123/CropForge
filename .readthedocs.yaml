version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Use MkDocs as the documentation framework
mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # Install the package itself in editable mode so autodoc can import cropforge
    - method: pip
      path: .
    # Install documentation dependencies
    - requirements: docs/requirements.txt
